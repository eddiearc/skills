<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>__MARKMAP_TITLE__ - Mindmap Playground</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
  border-bottom: 1px solid #e0e0e0; padding: 12px 24px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.toolbar h1 { font-size: 16px; font-weight: 600; color: #333; white-space: nowrap; }
.style-group { display: flex; gap: 8px; flex-wrap: wrap; }
.style-btn {
  padding: 6px 14px; border-radius: 20px; border: 2px solid #ddd;
  background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.style-btn:hover { border-color: #999; }
.style-btn.active { border-color: #4A90D9; background: #EBF3FB; color: #2B6CB0; font-weight: 600; }
.style-btn .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

.controls {
  margin-left: auto; display: flex; gap: 12px; align-items: center; font-size: 13px; color: #666;
}
.controls label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.controls select, .controls input[type=range] { font-size: 13px; }

#mindmap-container {
  position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
}
svg#mindmap { width: 100%; height: 100%; }

.export-btn {
  padding: 6px 14px; border-radius: 20px; border: 2px solid #48bb78;
  background: #f0fff4; color: #276749; cursor: pointer; font-size: 13px;
  font-weight: 600; transition: all 0.2s;
}
.export-btn:hover { background: #48bb78; color: white; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🎨 Style</h1>
  <div class="style-group" id="styleGroup"></div>
  <div class="controls">
    <label>展开层级
      <select id="expandLevel">
        <option value="1">1级</option>
        <option value="2" selected>2级</option>
        <option value="3">3级</option>
        <option value="-1">全部</option>
      </select>
    </label>
    <label>节点宽度
      <input type="range" id="maxWidth" min="0" max="300" value="0" step="10">
      <span id="maxWidthVal">自动</span>
    </label>
    <button class="export-btn" onclick="exportHTML()">导出 HTML</button>
  </div>
</div>

<div id="mindmap-container">
  <svg id="mindmap"></svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-toolbar"></script>

<script>
const STYLES = {
  '默认彩虹': {
    colors: null,
    bg: '#ffffff',
    fontCSS: '',
    colorFreezeLevel: 2,
  },
  '莫兰迪': {
    colors: ['#B4A7D6','#A4C2A5','#D4A574','#7BA7BC','#C49A9A','#8DB596','#B8A9C9','#D4B896'],
    bg: '#FAF8F5',
    fontCSS: 'font-family: "Noto Serif SC", "Source Han Serif CN", Georgia, serif;',
    colorFreezeLevel: 2,
  },
  '科技蓝': {
    colors: ['#1890ff','#36cfc9','#597ef7','#9254de','#f759ab','#faad14'],
    bg: '#0a1628',
    dark: true,
    fontCSS: 'font-family: "SF Mono", "Fira Code", monospace;',
    colorFreezeLevel: 2,
  },
  '森林绿': {
    colors: ['#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2','#b7e4c7'],
    bg: '#f1faee',
    fontCSS: '',
    colorFreezeLevel: 1,
  },
  '暖阳橘': {
    colors: ['#e76f51','#f4a261','#e9c46a','#2a9d8f','#264653','#d62828'],
    bg: '#fffbf0',
    fontCSS: '',
    colorFreezeLevel: 2,
  },
  '高级灰': {
    colors: ['#6c757d','#495057','#adb5bd','#868e96','#343a40','#ced4da'],
    bg: '#ffffff',
    fontCSS: 'font-family: "Helvetica Neue", Arial, sans-serif;',
    colorFreezeLevel: 2,
  },
  '马卡龙': {
    colors: ['#FF6B6B','#4ECDC4','#FFE66D','#95E1D3','#F38181','#AA96DA','#FCE38A','#EAFFD0'],
    bg: '#ffffff',
    fontCSS: 'font-family: -apple-system, "PingFang SC", sans-serif;',
    colorFreezeLevel: 2,
  },
  '黑金': {
    colors: ['#d4af37','#c5a028','#b8960f','#f0d060','#e8c840','#daa520'],
    bg: '#1a1a2e',
    dark: true,
    fontCSS: 'font-family: "Playfair Display", Georgia, serif;',
    colorFreezeLevel: 1,
  },
};

const TITLE = "__MARKMAP_TITLE__";
const ROOT = __MARKMAP_DATA__;

let mm;
let currentStyle = '默认彩虹';

function buildButtons() {
  const group = document.getElementById('styleGroup');
  Object.entries(STYLES).forEach(([name, s]) => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (name === currentStyle ? ' active' : '');
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = s.colors ? s.colors[0] : '#1f77b4';
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(name));
    btn.onclick = () => applyStyle(name);
    group.appendChild(btn);
  });
}

function applyStyle(name) {
  currentStyle = name;
  const s = STYLES[name];

  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.style-btn').forEach(b => {
    if (b.textContent === name) b.classList.add('active');
  });

  document.getElementById('mindmap-container').style.background = s.bg;

  if (s.dark) {
    document.documentElement.classList.add('markmap-dark');
    document.querySelector('.toolbar').style.background = 'rgba(26,26,46,0.95)';
    document.querySelector('.toolbar').style.borderColor = '#333';
    document.querySelector('.toolbar h1').style.color = '#eee';
    document.querySelectorAll('.controls, .controls label').forEach(e => e.style.color = '#aaa');
  } else {
    document.documentElement.classList.remove('markmap-dark');
    document.querySelector('.toolbar').style.background = 'rgba(255,255,255,0.95)';
    document.querySelector('.toolbar').style.borderColor = '#e0e0e0';
    document.querySelector('.toolbar h1').style.color = '#333';
    document.querySelectorAll('.controls, .controls label').forEach(e => e.style.color = '#666');
  }

  document.getElementById('mindmap').style.cssText = s.fontCSS || '';
  rebuildMarkmap(s);
}

function rebuildMarkmap(s) {
  if (mm) { try { mm.destroy(); } catch(e) {} mm = null; }

  const svg = document.getElementById('mindmap');
  svg.innerHTML = '';

  const expandLevel = parseInt(document.getElementById('expandLevel').value);
  const maxWidth = parseInt(document.getElementById('maxWidth').value);

  const colorFn = s.colors
    ? d3.scaleOrdinal(s.colors)
    : d3.scaleOrdinal(d3.schemeCategory10);

  mm = markmap.Markmap.create(svg, {
    color: (node) => colorFn(node.state?.path || ''),
    colorFreezeLevel: s.colorFreezeLevel || 2,
    initialExpandLevel: expandLevel,
    maxWidth: maxWidth || 0,
    spacingHorizontal: 80,
    spacingVertical: 5,
    autoFit: true,
    duration: 300,
    zoom: true,
    pan: true,
  }, JSON.parse(JSON.stringify(ROOT)));
}

function exportHTML() {
  const s = STYLES[currentStyle];
  const expandLevel = document.getElementById('expandLevel').value;
  const maxWidth = document.getElementById('maxWidth').value;

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>${TITLE}</title>
<style>
* { margin: 0; padding: 0; }
body { background: ${s.bg}; ${s.fontCSS || ''} }
svg { width: 100vw; height: 100vh; }
</style>
</head><body>
<svg id="mindmap"></svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7"><\/script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view"><\/script>
<script src="https://cdn.jsdelivr.net/npm/markmap-toolbar"><\/script>
<script>
const ROOT = ${JSON.stringify(ROOT)};
const colorFn = d3.scaleOrdinal(${JSON.stringify(s.colors || null)} || d3.schemeCategory10);
const mm = markmap.Markmap.create('svg#mindmap', {
  color: (node) => colorFn(node.state?.path || ''),
  colorFreezeLevel: ${s.colorFreezeLevel || 2},
  initialExpandLevel: ${expandLevel},
  maxWidth: ${maxWidth || 0},
  autoFit: true, duration: 300, zoom: true, pan: true,
}, ROOT);
${s.dark ? 'document.documentElement.classList.add("markmap-dark");' : ''}
const { Toolbar } = markmap;
const toolbar = Toolbar.create(mm);
toolbar.setBrand(false);
const el = toolbar.render();
el.style = "position:absolute;bottom:20px;right:20px";
document.body.append(el);
<\/script></body></html>`;

  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = TITLE + '-' + currentStyle + '.html';
  a.click();
}

document.getElementById('expandLevel').onchange = () => rebuildMarkmap(STYLES[currentStyle]);
document.getElementById('maxWidth').oninput = (e) => {
  document.getElementById('maxWidthVal').textContent = e.target.value == 0 ? '自动' : e.target.value + 'px';
  rebuildMarkmap(STYLES[currentStyle]);
};

buildButtons();
applyStyle('默认彩虹');
</script>
</body>
</html>
